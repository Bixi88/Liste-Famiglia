<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiFa</title>
    
    <link rel="manifest" href="/Liste-Famiglia/manifest.json?v=2">
    
    <meta id="meta-theme-color" name="theme-color" content="#121612">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121612">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="msapplication-navbutton-color" content="#121612">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #ffffff;
            --surface-color: #f6f8fa;
            --card-color: #ffffff;
            --text-color: #000000; 
            --text-secondary: #57606a;
            --accent-color: #0061FF; 
            --accent-light: rgba(0, 97, 255, 0.08);
            --border-color: #e1e4e6;
            --squircle-radius: 20px;
            --transition-speed: 0.22s;
            --bounce-curve: cubic-bezier(0.25, 1, 0.5, 1);
        }

        html[data-theme="dark"] {
            --bg-color: #121612;
            --surface-color: #1a201a;
            --card-color: #161b16;
            --text-color: #ffffff; 
            --text-secondary: #a0aaa0;
            --accent-color: #10B981; 
            --accent-light: rgba(16, 185, 129, 0.08);
            --border-color: #252e25;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background-color var(--transition-speed);
            overscroll-behavior-y: contain;
            overflow-x: hidden;
        }

        header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        h1 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        
        .settings-btn {
            background: none; border: none; color: var(--text-color);
            font-size: 20px; cursor: pointer; padding: 4px; display: flex; align-items: center;
            opacity: 0.8; transition: transform 0.2s;
        }
        .settings-btn:hover { transform: rotate(45deg); opacity: 1; }

        .nav-tabs {
            display: flex;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 55px;
            z-index: 10;
            overflow-x: auto;
        }
        .nav-tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex: 1;
            min-width: 80px;
            text-align: center;
            padding: 14px 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            border-bottom: 3px solid transparent;
            transition: all var(--transition-speed) var(--bounce-curve);
            white-space: nowrap;
            text-transform: uppercase;
        }
        .tab-btn.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        .main-container { width: 100%; overflow: hidden; }
        .tabs-slider { 
            display: flex; 
            width: 100%; 
            transition: transform var(--transition-speed) var(--bounce-curve); 
            will-change: transform; 
        }
        .tab-content { width: 100%; flex-shrink: 0; padding: 14px; max-width: 600px; margin: 0 auto; padding-bottom: 40px; min-height: calc(100vh - 120px); }

        .block-group { margin-bottom: 16px; }
        .block-header-squircle {
            background-color: var(--accent-light); border: 1px solid var(--border-color);
            border-radius: var(--squircle-radius); padding: 10px 16px; font-size: 13px;
            font-weight: 800; color: var(--accent-color); margin-bottom: 6px;
            text-transform: uppercase;
            display: flex; justify-content: space-between; align-items: center;
        }

        .block-add-btn {
            background: none; border: none; color: var(--accent-color);
            font-size: 20px; font-weight: 800; cursor: pointer; padding: 0 4px;
            display: flex; align-items: center; justify-content: center;
        }

        .block-body-squircle { background-color: var(--card-color); border: 1px solid var(--border-color); border-radius: var(--squircle-radius); padding: 12px 16px; }

        .ai-suggestions-container { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-top: -2px; }
        .ai-suggestions-container::-webkit-scrollbar { display: none; }
        .ai-chip {
            padding: 5px 11px; background-color: var(--surface-color); border: 1px solid var(--accent-color); 
            border-radius: 10px; font-size: 11px; color: var(--text-color); opacity: 0.7; white-space: nowrap; cursor: pointer;
        }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 4px; border-bottom: 1px solid var(--border-color); }
        .list-item-text { font-size: 15px; font-weight: 600; flex: 1; }
        .list-item-actions { display: flex; align-items: center; gap: 12px; }
        
        .film-list .list-item { padding: 6px 4px; }
        .film-list .list-item-text { font-size: 12.5px; font-weight: 500; }
        
        .drag-handle { 
            color: var(--text-secondary); 
            font-size: 16px; 
            cursor: grab; 
            opacity: 0.4; 
            padding: 4px; 
            display: flex; 
            align-items: center; 
            user-select: none;
            -webkit-user-select: none;
        }
        .drag-handle:active { cursor: grabbing; opacity: 0.9; }
        
        .sortable-ghost { opacity: 0.3; background-color: var(--surface-color); }

        .delete-btn { background: none; border: none; color: #ff4d4d; font-size: 15px; opacity: 0.5; cursor: pointer; padding: 4px; }
        .delete-btn:hover { opacity: 1; }

        .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: none; opacity: 0; transition: opacity var(--transition-speed); }
        .backdrop.open { display: block; opacity: 1; }

        /* MODAL POPUP CENTRATO E ULTRA SCARNO */
        .sheet { 
            position: fixed; top: 0; left: 50%; transform: translate(-50%, -100%); width: 100%; max-width: 600px; 
            background: var(--bg-color); padding: 24px; border-radius: 0 0 20px 20px; z-index: 101; 
            transition: transform var(--transition-speed) var(--bounce-curve); box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-height: 90vh; overflow-y: auto;
        }
        .sheet.open { transform: translate(-50%, 0); }

        #addSheet.sheet {
            top: 35%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 88%;
            max-width: 400px;
            border-radius: 24px;
            opacity: 0;
            visibility: hidden;
            transition: transform var(--transition-speed) var(--bounce-curve), opacity var(--transition-speed);
        }
        #addSheet.sheet.open {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            visibility: visible;
        }
        #addSheet h3 {
            margin: 0 0 16px 0;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent-color);
            letter-spacing: 0.5px;
        }

        /* Rimosse anche le lenti di ingrandimento grafiche dei campi search nei browser Webkit */
        .input-field { width: 100%; padding: 14px; border-radius: 16px; border: 2px solid var(--border-color); background: var(--surface-color); color: var(--text-color); margin-bottom: 14px; outline: none; font-weight: 600; -webkit-appearance: none; }
        .input-field::-webkit-search-decoration,
        .input-field::-webkit-search-cancel-button,
        .input-field::-webkit-search-results-button,
        .input-field::-webkit-search-results-decoration { display: none; }

        .btn { width: 100%; border: none; padding: 14px; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 8px; font-size: 14px; }
        .btn-danger { background-color: #ff4d4d !important; color: white !important; }
        .btn-secondary { background-color: var(--surface-color) !important; color: var(--text-color) !important; border: 1px solid var(--border-color); }
        
        .market-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 10px; }
        .select-chip { padding: 12px; border-radius: 16px; cursor: pointer; font-size: 13px; font-weight: 700; text-align: center; text-transform: uppercase; }

        .settings-section { margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; }
        .settings-title { font-size: 14px; font-weight: 800; margin-bottom: 10px; color: var(--accent-color); }
        .manage-item { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .manage-item input { flex: 1; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--surface-color); color: var(--text-color); font-weight: 600; }
        
        .uppercase-input { text-transform: uppercase; }

        .manage-item-block { gap: 6px; margin-bottom: 6px; padding-left: 8px; }
        .manage-item-block input { 
            font-size: 13px !important; 
            font-weight: 400 !important; 
            padding: 6px 10px !important; 
            color: var(--text-secondary) !important; 
            border-radius: 8px !important;
        }
        .manage-item-block input:focus { color: var(--text-color) !important; }
        .manage-item-block .delete-btn { font-size: 12px !important; opacity: 0.4; padding: 4px 8px; }
        .btn-small { padding: 8px 12px !important; font-size: 12px !important; border-radius: 10px !important; width: auto !important; margin-left: 8px; }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .switch-label { font-size: 14px; font-weight: 700; }

        .theme-switch { width: 44px; height: 22px; background: var(--surface-color); border-radius: 11px; position: relative; border: 1px solid var(--border-color); cursor: pointer; transition: background-color 0.2s; }
        .theme-switch-handle { width: 16px; height: 16px; background: var(--text-secondary); border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: transform 0.2s, background-color 0.2s; }
        
        html[data-theme="dark"] header .theme-switch-handle { transform: translateX(22px); background: var(--accent-color); }
        html:not([data-theme="dark"]) header .theme-switch-handle { background: var(--accent-color); }

        .selector-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); margin-bottom: 10px; display: block; letter-spacing: 0.5px; }
        .empty-text { color: var(--text-secondary); font-size: 13px; font-style: italic; opacity: 0.5; }

        html:not([data-theme="dark"]) .select-chip { background: #f6f8fa !important; color: #000000 !important; border: 1px solid #e1e4e6 !important; }
        html:not([data-theme="dark"]) .select-chip.selected { background: #0061FF !important; color: #ffffff !important; border-color: #0061FF !important; }
        html:not([data-theme="dark"]) .btn-confirm { background: #0061FF !important; color: #ffffff !important; }

        html[data-theme="dark"] .select-chip { background: #161b16 !important; color: #ffffff !important; border: 1px solid #252e25 !important; }
        html[data-theme="dark"] .select-chip.selected { background: #10B981 !important; color: #121612 !important; border-color: #10B981 !important; }
        html[data-theme="dark"] .btn-confirm { background: #10B981 !important; color: #121612 !important; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="settings-btn" onclick="openSettingsSheet()">⚙️</button>
            <h1>LiFa</h1>
        </div>
        <div class="theme-switch" onclick="toggleTheme()"><div class="theme-switch-handle"></div></div>
    </header>

    <div class="nav-tabs" id="nav-tabs-container"></div>

    <div class="main-container" id="swipe-area">
        <div class="tabs-slider" id="tabs-slider"></div>
    </div>

    <div class="backdrop" id="backdrop" onclick="closeAllSheets()"></div>

    <div class="sheet" id="addSheet">
        <h3 id="add-popup-title">Aggiungi Elemento</h3>
        <input type="search" 
               inputmode="text"
               id="item-input" 
               class="input-field" 
               placeholder="Cosa vuoi aggiungere?" 
               onkeyup="handleKeyUp(event)"
               autocomplete="off" 
               autocorrect="off" 
               autocapitalize="off" 
               spellcheck="false">
               
        <div id="target-selector-container" style="display:none;">
            <span class="selector-label" id="selector-label-text">SCEGLI DOVE INSERIRE:</span>
            <div class="market-selector" id="market-selector-chips"></div>
        </div>
    </div>

    <div class="sheet" id="settingsSheet">
        <h3>Impostazioni Struttura</h3>
        
        <div class="settings-section">
            <div class="toggle-row">
                <span class="switch-label">Mostra suggerimenti AI predittivi</span>
                <div class="theme-switch" id="ai-toggle-switch" onclick="toggleAISuggestions()"><div class="theme-switch-handle" id="ai-toggle-handle"></div></div>
            </div>
