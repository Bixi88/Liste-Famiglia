<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Hub - Spesa & Famiglia</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            /* Light Mode Palette Default */
            --bg-color: #ffffff;
            --surface-color: #f6f8fa;
            --text-color: #1f2328;
            --text-secondary: #657180;
            --accent-color: #0061FF; /* Android Electric Blue */
            --accent-light: rgba(0, 97, 255, 0.1);
            --border-color: #d0d7de;
            --squircle-radius: 24px;
            --transition-speed: 0.3s;
        }

        [data-theme="dark"] {
            /* Dark Mode Palette (Verde grigio molto scuro e accenti verde chiaro) */
            --bg-color: #121612;
            --surface-color: #1a201a;
            --text-color: #ffffff;
            --text-secondary: #a0aaa0;
            --accent-color: #A7F3D0; /* Verde chiaro brillante */
            --accent-light: rgba(167, 243, 208, 0.1);
            --border-color: #2d382d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            display: block;
        }

        /* Header & Theme Switcher */
        header {
            padding: 20px;
            display: block;
            position: relative;
            border-bottom: 1px solid var(--border-color);
        }

        .header-container {
            display: table;
            width: 100%;
        }

        .header-title {
            display: table-cell;
            vertical-align: middle;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .theme-toggle-cell {
            display: table-cell;
            text-align: right;
            vertical-align: middle;
        }

        .theme-btn {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            width: 44px;
            height: 44px;
            font-size: 18px;
            transition: transform 0.2s ease, background-color var(--transition-speed);
        }

        .theme-btn:active {
            transform: scale(0.9);
        }

        /* Navigation Tabs (Android Material Style) */
        .nav-tabs {
            display: table;
            width: 100%;
            table-layout: fixed;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            display: table-cell;
            text-align: center;
            padding: 16px 0;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-secondary);
            border-bottom: 3px solid transparent;
            transition: color var(--transition-speed), border-color var(--transition-speed);
        }

        .tab-btn.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        /* Main Content Container */
        .main-container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtabs per la Spesa (LIDL, EUROSPIN, etc.) */
        .subtabs-container {
            overflow-x: auto;
            white-space: nowrap;
            padding: 5px 0 15px 0;
            -webkit-overflow-scrolling: touch;
        }

        .subtab-btn {
            display: inline-block;
            padding: 8px 18px;
            margin-right: 8px;
            border-radius: var(--squircle-radius);
            background-color: var(--surface-color);
            color: var(--text-color);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .subtab-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }
        
        [data-theme="dark"] .subtab-btn.active {
            color: #121612;
        }
        
        body:not([data-theme="dark"]) .subtab-btn.active {
            color: #ffffff;
        }

        /* List Items Styling (Elegant Squircle Cards) */
        .list-container {
            margin-top: 10px;
        }

        .list-item {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--squircle-radius);
            padding: 16px 20px;
            margin-bottom: 12px;
            display: table;
            width: 100%;
            transition: transform 0.2s ease, opacity 0.3s ease;
        }

        .list-item-cell-text {
            display: table-cell;
            vertical-align: middle;
            font-size: 16px;
            font-weight: 500;
        }

        .list-item-cell-action {
            display: table-cell;
            vertical-align: middle;
            text-align: right;
            width: 40px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .delete-btn:hover {
            opacity: 1;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* Bottom Floating Action Button (FAB) */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--accent-color);
            border: none;
            border-radius: var(--squircle-radius);
            width: 56px;
            height: 56px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transition: transform 0.2s ease;
            z-index: 99;
        }

        [data-theme="dark"] .fab {
            color: #121612;
        }
        
        body:not([data-theme="dark"]) .fab {
            color: #ffffff;
        }

        .fab:active {
            transform: scale(0.9) rotate(90deg);
        }

        /* Elegant Micro-Modal Bottom Sheet */
        .bottom-sheet-backdrop {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 100;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background-color: var(--bg-color);
            border-top-left-radius: var(--squircle-radius);
            border-top-right-radius: var(--squircle-radius);
            padding: 24px;
            z-index: 101;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            max-width: 600px;
            margin: 0 auto;
        }

        .bottom-sheet.open {
            transform: translateY(0);
        }

        .bottom-sheet-backdrop.open {
            display: block;
            opacity: 1;
        }

        .bottom-sheet h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            border-radius: var(--squircle-radius);
            border: 2px solid var(--border-color);
            background-color: var(--surface-color);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }

        .input-field:focus {
            border-color: var(--accent-color);
        }

        .sheet-buttons {
            text-align: right;
        }

        .btn {
            padding: 12px 24px;
            border-radius: var(--squircle-radius);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            display: inline-block;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-secondary);
            margin-right: 8px;
        }

        .btn-confirm {
            background-color: var(--accent-color);
        }

        [data-theme="dark"] .btn-confirm {
            color: #121612;
        }
        
        body:not([data-theme="dark"]) .btn-confirm {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="header-title">
                <h1 id="hub-title">Home Hub</h1>
            </div>
            <div class="theme-toggle-cell">
                <button class="theme-btn" onclick="toggleTheme()" id="theme-icon">🌓</button>
            </div>
        </div>
    </header>

    <div class="nav-tabs">
        <div class="tab-btn active" onclick="switchTab('spesa')">SPESA</div>
        <div class="tab-btn" onclick="switchTab('film')">FILM</div>
        <div class="tab-btn" onclick="switchTab('famiglia')">FAMIGLIA</div>
    </div>

    <div class="main-container">
        
        <div id="tab-spesa" class="tab-content active">
            <div class="subtabs-container">
                <div class="subtab-btn active" onclick="switchSubtab('LIDL')">LIDL</div>
                <div class="subtab-btn" onclick="switchSubtab('EUROSPIN')">EUROSPIN</div>
                <div class="subtab-btn" onclick="switchSubtab('SOLE365')">SOLE365</div>
                <div class="subtab-btn" onclick="switchSubtab('ACTION')">ACTION</div>
            </div>
            <div id="spesa-list" class="list-container"></div>
        </div>

        <div id="tab-film" class="tab-content">
            <div id="film-list" class="list-container"></div>
        </div>

        <div id="tab-famiglia" class="tab-content">
            <div id="famiglia-list" class="list-container"></div>
        </div>

    </div>

    <button class="fab" onclick="openBottomSheet()">+</button>

    <div class="bottom-sheet-backdrop" id="backdrop" onclick="closeBottomSheet()"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <h3 id="sheet-title">Aggiungi Elemento</h3>
        <input type="text" id="item-input" class="input-field" placeholder="Scrivi qui..." onkeyup="handleKeyUp(event)">
        <div class="sheet-buttons">
            <button class="btn btn-cancel" onclick="closeBottomSheet()">Annulla</button>
            <button class="btn btn-confirm" onclick="addItem()">Aggiungi</button>
        </div>
    </div>

    <script>
        // Stato dell'applicazione salvato in localStorage
        let state = JSON.parse(localStorage.getItem('homeHubState')) || {
            spesa: { LIDL: [], EUROSPIN: [], SOLE365: [], ACTION: [] },
            film: [],
            famiglia: []
        };

        let currentTab = 'spesa';
        let currentSubtab = 'LIDL';

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            renderLists();
        });

        function saveState() {
            localStorage.setItem('homeHubState', JSON.stringify(state));
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
            document.getElementById(`tab-${tabId}`).classList.add('active');
            renderLists();
        }

        function switchSubtab(subtabId) {
            currentSubtab = subtabId;
            document.querySelectorAll('.subtab-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
            renderLists();
        }

        function renderLists() {
            let container;
            let items = [];

            if (currentTab === 'spesa') {
                container = document.getElementById('spesa-list');
                items = state.spesa[currentSubtab] || [];
            } else if (currentTab === 'film') {
                container = document.getElementById('film-list');
                items = state.film || [];
            } else {
                container = document.getElementById('famiglia-list');
                items = state.famiglia || [];
            }

            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = `<div class="empty-state">La lista è vuota. Premi il tasto "+" in basso per iniziare.</div>`;
                return;
            }

            items.forEach((item, index) => {
                const element = document.createElement('div');
                element.className = 'list-item';
                element.innerHTML = `
                    <div class="list-item-cell-text">${escapeHTML(item)}</div>
                    <div class="list-item-cell-action">
                        <button class="delete-btn" onclick="deleteItem(${index})">✕</button>
                    </div>
                `;
                container.appendChild(element);
            });
        }

        function openBottomSheet() {
            let titleText = "Aggiungi a " + currentTab.toUpperCase();
            if (currentTab === 'spesa') {
                titleText += " (" + currentSubtab + ")";
            }
            document.getElementById('sheet-title').innerText = titleText;
            document.getElementById('item-input').value = '';
            
            document.getElementById('backdrop').classList.add('open');
            document.getElementById('bottomSheet').classList.add('open');
            setTimeout(() => document.getElementById('item-input').focus(), 150);
        }

        function closeBottomSheet() {
            document.getElementById('backdrop').classList.remove('open');
            document.getElementById('bottomSheet').classList.remove('open');
        }

        function addItem() {
            const input = document.getElementById('item-input');
            const val = input.value.trim();
            if (!val) return;

            if (currentTab === 'spesa') {
                state.spesa[currentSubtab].push(val);
            } else {
                state[currentTab].push(val);
            }

            saveState();
            renderLists();
            closeBottomSheet();
        }

        function handleKeyUp(e) {
            if (e.key === 'Enter') addItem();
        }

        function deleteItem(index) {
            if (currentTab === 'spesa') {
                state.spesa[currentSubtab].splice(index, 1);
            } else {
                state[currentTab].splice(index, 1);
            }
            saveState();
            renderLists();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
