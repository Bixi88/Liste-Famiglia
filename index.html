<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiFa</title>
    <style>
        :root {
            --bg-color: #0c0f0c;
            --surface-color: #111611;
            --card-color: #171d17;
            --text-color: #ffffff; 
            --text-secondary: #606f60;
            --accent-color: #10B981; 
            --accent-light: rgba(16, 185, 129, 0.05);
            --border-color: #202b20;
            --squircle-radius: 24px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000; 
            color: var(--text-color); 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center;
        }

        .phone-frame { 
            width: 100%; 
            max-width: 500px; 
            min-height: 100vh; 
            background: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-sizing: border-box; 
        }
        
        header { 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        h1 { 
            margin: 0; 
            font-size: 24px; 
            font-weight: 800; 
        }

        .toggle-accent { 
            width: 40px; 
            height: 22px; 
            background: var(--accent-color); 
            border-radius: 11px; 
        }

        .nav-tabs { 
            display: flex; 
            width: 100%; 
            border-bottom: 1px solid var(--border-color); 
        }

        .tab-btn { 
            flex: 1; 
            text-align: center; 
            padding: 16px 10px; 
            font-weight: 700; 
            font-size: 12px; 
            letter-spacing: 1px; 
            color: var(--text-secondary); 
            text-transform: uppercase; 
        }

        .tab-btn.active { 
            color: var(--accent-color); 
            border-bottom: 2px solid var(--accent-color); 
        }

        .content { 
            padding: 16px; 
            flex: 1; 
        }

        .block-group { 
            margin-bottom: 20px; 
        }
        
        .block-header {
            background-color: var(--accent-light); 
            border: 1px solid var(--border-color);
            border-radius: var(--squircle-radius); 
            padding: 14px 20px; 
            font-size: 14px;
            font-weight: 800; 
            color: var(--accent-color); 
            letter-spacing: 0.5px;
            text-transform: uppercase; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .add-btn { 
            background: none; 
            border: none; 
            color: var(--accent-color); 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            padding: 0; 
        }

        .block-body { 
            background-color: var(--card-color); 
            border: 1px solid var(--border-color); 
            border-radius: var(--squircle-radius); 
            padding: 6px 20px; 
            margin-top: 8px; 
        }

        .list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 14px 0; 
            border-bottom: 1px solid #1f281f; 
        }

        .list-item:last-child { 
            border-bottom: none; 
        }

        .list-item-text { 
            font-size: 16px; 
            font-weight: 500; 
        }

        .delete-btn { 
            background: none; 
            border: none; 
            color: #e65050; 
            font-size: 16px; 
            opacity: 0.4; 
            cursor: pointer; 
        }

        .empty { 
            padding: 14px 0; 
            color: var(--text-secondary); 
            font-style: italic; 
            font-size: 15px; 
        }

        /* Sfondo oscurato al tap */
        .backdrop { 
            position: absolute; 
            inset: 0; 
            background: rgba(0,0,0,0.75); 
            display: none; 
            z-index: 100; 
        }
        
        /* Box Popup Ultra Scarno */
        .micro-popup {
            position: fixed; 
            top: 30%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            width: 88%; 
            max-width: 360px; 
            background: var(--card-color); 
            border: 1px solid var(--border-color);
            border-radius: 24px; 
            padding: 24px; 
            z-index: 101; 
            display: none; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .micro-popup h3 { 
            margin: 0 0 16px 0; 
            font-size: 14px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: var(--accent-color); 
            letter-spacing: 0.5px; 
        }
        
        /* Input con filtri avanzati anti-autofill per Android */
        .input-field { 
            width: 100%; 
            padding: 16px; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            background: var(--bg-color); 
            color: var(--text-color); 
            outline: none; 
            font-size: 16px; 
            font-weight: 500; 
            box-sizing: border-box; 
        }

        .input-field::placeholder { 
            color: var(--text-secondary); 
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <header>
            <div style="display:flex; align-items:center; gap:12px;"><h1>LiFa</h1></div>
            <div class="toggle-accent"></div>
        </header>

        <div class="nav-tabs">
            <div class="tab-btn active">Spesa</div>
            <div class="tab-btn">Film</div>
            <div class="tab-btn">Family</div>
        </div>

        <div class="content">
            <div class="block-group">
                <div class="block-header"><span>Lidl</span><button class="add-btn" onclick="apriPopup('lidl', 'Lidl')">+</button></div>
                <div class="block-body"><div id="lista-lidl" class="empty">Nessun elemento</div></div>
            </div>

            <div class="block-group">
                <div class="block-header"><span>Eurospin</span><button class="add-btn" onclick="apriPopup('eurospin', 'Eurospin')">+</button></div>
                <div class="block-body">
                    <div id="lista-eurospin">
                        <div class="list-item"><div class="list-item-text">Latte cacao protein</div><button class="delete-btn" onclick="rimuoviItem(this, 'eurospin')">✕</button></div>
                    </div>
                </div>
            </div>

            <div class="block-group">
                <div class="block-header"><span>Sole365</span><button class="add-btn" onclick="apriPopup('sole365', 'Sole365')">+</button></div>
                <div class="block-body"><div id="lista-sole365" class="empty">Nessun elemento</div></div>
            </div>

            <div class="block-group">
                <div class="block-header"><span>Action</span><button class="add-btn" onclick="apriPopup('action', 'Action')">+</button></div>
                <div class="block-body">
                    <div id="lista-action">
                        <div class="list-item"><div class="list-item-text">Piadine</div><button class="delete-btn" onclick="rimuoviItem(this, 'action')">✕</button></div>
                        <div class="list-item"><div class="list-item-text">Noodles</div><button class="delete-btn" onclick="rimuoviItem(this, 'action')">✕</button></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="backdrop" id="backdrop" onclick="chiudiPopup()"></div>
        <div class="micro-popup" id="microPopup">
            <h3 id="popup-title">Cosa vuoi aggiungere?</h3>
            
            <input type="text" 
                   id="popup-input" 
                   class="input-field" 
                   placeholder="Scrivi qui..." 
                   autocomplete="off" 
                   autocorrect="off" 
                   autocapitalize="off" 
                   spellcheck="false">
        </div>
    </div>

    <script>
        let bloccoAttivo = '';

        function apriPopup(idBlocco, nomeBlocco) {
            bloccoAttivo = idBlocco;
            document.getElementById('popup-title').innerText = `Aggiungi a ${nomeBlocco}`;
            const inp = document.getElementById('popup-input');
            inp.value = '';
            
            document.getElementById('backdrop').style.display = 'block';
            document.getElementById('microPopup').style.display = 'block';
            
            setTimeout(() => inp.focus(), 60);
        }

        function chiudiPopup() {
            document.getElementById('backdrop').style.display = 'none';
            document.getElementById('microPopup').style.display = 'none';
        }

        function salvaPopup() {
            const val = document.getElementById('popup-input').value.trim();
            if(val && bloccoAttivo) {
                const lista = document.getElementById(`lista-${bloccoAttivo}`);
                
                if (lista.classList.contains('empty')) {
                    lista.classList.remove('empty');
                    lista.innerHTML = '';
                }

                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `<div class="list-item-text">${val}</div><button class="delete-btn" onclick="rimuoviItem(this, '${bloccoAttivo}')">✕</button>`;
                lista.appendChild(item);
            }
            chiudiPopup();
        }

        function rimuoviItem(btn, idBlocco) {
            const container = btn.parentElement.parentElement;
            btn.parentElement.remove();
            if (container.children.length === 0) {
                container.classList.add('empty');
                container.innerHTML = 'Nessun elemento';
            }
        }

        document.getElementById('popup-input').addEventListener('keyup', (e) => {
            if(e.key === 'Enter') salvaPopup();
        });
    </script>
</body>
</html>
